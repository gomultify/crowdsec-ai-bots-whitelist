name: gomultify/ai-bots-whitelist
description: "Whitelist legitimate AI crawlers (GPTBot, OAI-SearchBot, PerplexityBot, Applebot, YandexBot)"
whitelist:
  reason: "Legitimate AI crawler"
  expression:
    - "any(File('gptbot_ips.txt'), { len(#) > 0 && IpInRange(evt.Overflow.Alert.Source.IP, #) })"
    - "any(File('oai_searchbot_ips.txt'), { len(#) > 0 && IpInRange(evt.Overflow.Alert.Source.IP, #) })"
    - "any(File('perplexitybot_ips.txt'), { len(#) > 0 && IpInRange(evt.Overflow.Alert.Source.IP, #) })"
    - "any(File('applebot_ips.txt'), { len(#) > 0 && IpInRange(evt.Overflow.Alert.Source.IP, #) })"
    - "any(File('yandexbot_ips.txt'), { len(#) > 0 && IpInRange(evt.Overflow.Alert.Source.IP, #) })"
data:
  - source_url: https://raw.githubusercontent.com/gomultify/crowdsec-ai-bots-whitelist/main/data/gptbot_ips.txt
    dest_file: gptbot_ips.txt
    type: string
  - source_url: https://raw.githubusercontent.com/gomultify/crowdsec-ai-bots-whitelist/main/data/oai_searchbot_ips.txt
    dest_file: oai_searchbot_ips.txt
    type: string
  - source_url: https://raw.githubusercontent.com/gomultify/crowdsec-ai-bots-whitelist/main/data/perplexitybot_ips.txt
    dest_file: perplexitybot_ips.txt
    type: string
  - source_url: https://raw.githubusercontent.com/gomultify/crowdsec-ai-bots-whitelist/main/data/applebot_ips.txt
    dest_file: applebot_ips.txt
    type: string
  - source_url: https://raw.githubusercontent.com/gomultify/crowdsec-ai-bots-whitelist/main/data/yandexbot_ips.txt
    dest_file: yandexbot_ips.txt
    type: string
